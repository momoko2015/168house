<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>88loft - 樓盤比較 (Compare Properties)</title>
    <link rel="stylesheet" href="/style.css?v=11">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0a0e1a; color: #e2e8f0; min-height: 100vh; }
        .compare-page { max-width: 1200px; margin: 40px auto; padding: 0 20px 80px; }
        
        .top-nav {
            background: rgba(17,24,39,0.9); backdrop-filter: blur(10px);
            padding: 15px 30px; display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; z-index: 100;
        }
        .back-btn { color: white; text-decoration: none; background: #7232f2; padding: 8px 18px; border-radius: 20px; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
        
        .compare-header { margin-bottom: 40px; text-align: center; }
        .compare-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
        .compare-header p { color: #94a3b8; }

        .compare-table-wrapper { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 20px; 
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .compare-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .compare-table th, .compare-table td { 
            padding: 25px; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        .compare-table th:last-child, .compare-table td:last-child { border-right: none; }
        
        .row-label { 
            background: rgba(255,255,255,0.02); 
            text-align: left !important; 
            font-weight: 600; 
            width: 180px; 
            color: #94a3b8;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .prop-img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; }
        .prop-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
        .prop-price { font-size: 1.4rem; font-weight: 800; color: #4ade80; }
        
        .feature-tag { 
            display: inline-block; 
            background: rgba(114,50,242,0.1); 
            color: #a78bfa; 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            margin: 2px;
        }

        .btn-view { 
            background: #7232f2; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 0.85rem;
            display: inline-block;
            margin-top: 15px;
            transition: transform 0.2s;
        }
        .btn-view:hover { transform: translateY(-2px); }

        @media(max-width: 768px) {
            .compare-table-wrapper { overflow-x: auto; }
            .compare-table { min-width: 800px; }
        }

        .loading-state { text-align: center; padding: 100px 0; }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="/hk.html" style="display:flex; align-items:center; gap:10px; text-decoration:none;">
        <img src="/logo.png" alt="88loft" style="height:36px; border-radius:6px;">
        <span style="font-size:1.3rem; font-weight:800; background:linear-gradient(45deg,#fff,#94a3b8); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">88loft</span>
    </a>
    <a href="/hk.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回</a>
</nav>

<div class="compare-page">
    <div class="compare-header">
        <h1>⚖️ 樓盤比較</h1>
        <p>助您分析不同樓盤的優劣，找出最心儀的家。</p>
        <div style="margin-top: 20px; display: flex; justify-content: center; gap: 12px;">
            <button onclick="clearCompareAndReturn()" class="back-btn" style="background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2);"><i class="fas fa-trash-alt"></i> 清除並返回</button>
            <a href="/hk.html" class="back-btn" style="background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1);"><i class="fas fa-search"></i> 繼續搵盤</a>
        </div>
    </div>

    <div id="loading" class="loading-state">
        <i class="fas fa-spinner fa-spin fa-3x" style="color: #7232f2;"></i>
        <p style="margin-top: 20px;">正在準備比較資料...</p>
    </div>

    <div id="compareContent" class="compare-table-wrapper" style="display: none;">
        <table class="compare-table">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://localhost:8000' : '';

    async function initCompare() {
        const params = new URLSearchParams(window.location.search);
        const ids = params.get('ids')?.split(',') || [];
        
        if (ids.length === 0) {
            document.getElementById('loading').innerHTML = '<h3>請選擇至少一個樓盤進行比較</h3><a href="/hk.html" class="back-btn" style="display:inline-block; margin-top:20px;">返回首頁</a>';
            return;
        }

        try {
            const res = await fetch(`${API_BASE}/api/properties?limit=10000`);
            const allProps = await res.json();
            const targetProps = allProps.filter(p => ids.includes(p.id.toString()));
            
            if (targetProps.length === 0) {
                document.getElementById('loading').innerHTML = '<h3>找不到相關樓盤資料</h3>';
                return;
            }

            renderTable(targetProps);
        } catch (e) {
            document.getElementById('loading').innerHTML = '<h3>資料載入出錯，請重試</h3>';
        }
    }

    function renderTable(props) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('compareContent').style.display = 'block';

        const head = document.getElementById('tableHead');
        const body = document.getElementById('tableBody');

        // Header row (Images and Titles)
        let headHTML = '<tr><th class="row-label">樓盤</th>';
        props.forEach(p => {
            const title = p.title.zh || p.title.en || 'Property';
            const img = p.image ? (p.image.startsWith('/uploads/') ? API_BASE + p.image : p.image) : '/placeholder.jpg';
            headHTML += `
                <th>
                    <img src="${img}" class="prop-img">
                    <div class="prop-title">${title}</div>
                    <div class="prop-price">${p.price}</div>
                    <a href="/property.html?id=${p.id}" class="btn-view">查看詳情</a>
                </th>
            `;
        });
        headHTML += '</tr>';
        head.innerHTML = headHTML;

        // Data rows
        const rows = [
            { label: '類型', key: 'type', format: v => v === 'rent' ? '租盤' : '售盤' },
            { label: '地區', key: 'area' },
            { label: '房間', key: 'beds', suffix: ' 房' },
            { label: '浴室', key: 'baths', suffix: ' 廁' },
            { label: '面積', key: 'sqft', suffix: ' 呎' },
            { label: '特色', key: 'features', isTags: true },
            { label: '刊登時間', key: 'created_at', format: v => new Date(v).toLocaleDateString() }
        ];

        let bodyHTML = '';
        rows.forEach(row => {
            bodyHTML += `<tr><td class="row-label">${row.label}</td>`;
            props.forEach(p => {
                let val = p[row.key] || '-';
                if (row.format) val = row.format(val);
                if (row.suffix && val !== '-') val += row.suffix;
                
                if (row.isTags && val !== '-') {
                    const tags = val.split(',').map(t => `<span class="feature-tag">${t.trim()}</span>`).join('');
                    val = `<div style="max-width: 200px; margin: 0 auto;">${tags}</div>`;
                }
                
                bodyHTML += `<td>${val}</td>`;
            });
            bodyHTML += '</tr>';
        });
        body.innerHTML = bodyHTML;
    }

    function clearCompareAndReturn() {
        localStorage.removeItem('88loft_compare');
        window.location.href = '/hk.html';
    }

    initCompare();
</script>
</body>
</html>
