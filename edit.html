<!DOCTYPE html>
<html lang="zh" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編輯樓盤 - 88Loft精選樓盤</title>
    <link rel="stylesheet" href="/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="utils.js?v=11"></script>
    <script src="districts.js"></script>
    <!-- Leaflet Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- SortableJS for rearranging photos -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .edit-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .edit-card {
            max-width: 800px;
            width: 100%;
            padding: 40px;
            border-radius: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(114, 50, 242, 0.1);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 40px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .feature-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 0.85rem;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
        }

        .feature-checkbox:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .feature-checkbox input {
            width: auto;
            cursor: pointer;
        }

        #mapPicker {
            height: 350px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Gallery Styles */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            min-height: 100px;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            cursor: move;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .gallery-item:hover {
            border-color: var(--accent-color);
            transform: scale(1.02);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 24px;
            height: 24px;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 10px;
            transition: background 0.2s;
        }

        .gallery-item .remove-btn:hover {
            background: #dc2626;
        }

        .gallery-item .sort-handle {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            pointer-events: none;
        }

        .custom-file-upload {
            width: 100%;
            margin-top: 10px;
        }

        .file-upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.02);
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload-label:hover {
            border-color: var(--accent-color);
            background: rgba(114, 50, 242, 0.05);
        }

        .file-upload-label i {
            font-size: 2rem;
            color: var(--accent-color);
        }

        #propFile {
            display: none;
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar glass">
        <div class="logo-container" style="display: flex; align-items: center; gap: 12px;">
            <img src="/logo.png" alt="88loft" style="height: 32px; border-radius: 6px;">
            <span style="font-weight: 800; font-size: 1.2rem;">88loft</span>
        </div>
        <ul class="nav-links" style="margin-left: auto;">
            <li><a href="/admin.html" class="btn-outline" style="padding: 8px 15px; font-size: 0.9rem;">返回控制台</a></li>
        </ul>
    </nav>

    <div class="edit-container">
        <div class="edit-card glass">
            <h2 style="margin-bottom: 10px;"><i class="fas fa-edit" style="color: var(--accent-color);"></i> 編輯樓盤</h2>
            <p style="color: #94a3b8; margin-bottom: 35px; font-size: 0.95rem;">更新物業資訊，確保地圖定位準確。</p>

            <form id="editForm">
                <div class="form-group">
                    <label>區域 (Country/Region)</label>
                    <select id="propArea" required style="border: 2px solid var(--accent-color); background: rgba(114, 50, 242, 0.1);">
                        <option value="HK">香港 (Hong Kong)</option>
                        <option value="JP">日本 (Japan)</option>
                        <option value="USA">美國 (USA)</option>
                        <option value="China">中國內地 (China)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label id="lblTitle">物業名稱 (Property Title)</label>
                    <input type="text" id="propTitle" placeholder="例如：西九龍 凱旋門 高層單位" required>
                    <input type="hidden" id="propTitleCN">
                    <input type="hidden" id="propTitleEN">
                    <input type="hidden" id="propTitleJP">
                </div>

                <div class="form-group">
                    <label id="lblDistrict">地區 (District)</label>
                    <select id="propDistrict" style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white;">
                        <option value="">-- 選擇地區 (Select District) --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label id="lblLocation">地點 (Location)</label>
                    <input type="text" id="propLocation" placeholder="例如：尖沙咀 柯士甸道" required>
                    <input type="hidden" id="propLocationCN">
                    <input type="hidden" id="propLocationEN">
                    <input type="hidden" id="propLocationJP">
                </div>

                <!-- Map Section -->
                <div class="form-group">
                    <label>地圖定位 (Map Location)</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px;">
                        <div>
                            <span style="font-size: 0.75rem; color: #64748b;">緯度 (Latitude)</span>
                            <input type="number" id="propLat" step="any" oninput="syncMapFromInputs()">
                        </div>
                        <div>
                            <span style="font-size: 0.75rem; color: #64748b;">經度 (Longitude)</span>
                            <input type="number" id="propLng" step="any" oninput="syncMapFromInputs()">
                        </div>
                    </div>
                    <button type="button" class="btn-outline" style="width: 100%; padding: 10px; font-size: 0.85rem; margin-bottom: 10px;" onclick="lookupAddress()">
                        <i class="fas fa-search-location"></i> 根據地點自動定位 (Auto-locate by Address)
                    </button>
                    <div id="mapPicker"></div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>種類 (Type)</label>
                        <select id="propType" required>
                            <option value="rent">租盤 (Rent)</option>
                            <option value="sale">售盤 (Sale)</option>
                            <option value="commercial">商業 (Commercial)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>價格 (Price)</label>
                        <input type="text" id="propPrice" placeholder="例如: 15,000" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>房間 (Beds)</label>
                        <input type="number" id="propBeds" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>廁所 (Baths)</label>
                        <input type="number" id="propBaths" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>呎數 (Sqft)</label>
                        <input type="number" id="propSqft" min="0" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>相片管理 (Photo Management)</label>
                    <p style="font-size: 0.75rem; color: #64748b; margin-bottom: 10px;">拖放相片可調整排序，第一張將作為主圖。</p>
                    <div id="gallerySortable" class="gallery-container">
                        <!-- Loaded existing photos here -->
                    </div>
                    
                    <div class="custom-file-upload">
                        <input type="file" id="propFile" accept="image/*" multiple onchange="handleNewPhotos(this)">
                        <label for="propFile" class="file-upload-label">
                            <i class="fas fa-plus-circle"></i>
                            <span style="font-weight: 600;">新增相片 / Add Photos</span>
                            <span style="font-size: 0.8rem; color: #64748b;">支持多選上傳</span>
                        </label>
                    </div>
                    <div id="uploadStatus" style="font-size: 0.8rem; color: var(--accent-color); margin-top: 10px; text-align: center;"></div>
                </div>

                <div class="form-group">
                    <label>物業特色 (Features)</label>
                    <div class="features-grid">
                        <label class="feature-checkbox"><input type="checkbox" name="feature" value="海景"> 🌊 海景</label>
                        <label class="feature-checkbox"><input type="checkbox" name="feature" value="山景"> ⛰️ 山景</label>
                        <label class="feature-checkbox"><input type="checkbox" name="feature" value="園景"> 🌳 園景</label>
                        <label class="feature-checkbox"><input type="checkbox" name="feature" value="開揚景觀"> 🏙️ 開揚景觀</label>
                        <label class="feature-checkbox"><input type="checkbox" name="feature" value="鄰近地鐵"> 🚇 鄰近地鐵</label>
                        <label class="feature-checkbox"><input type="checkbox" name="feature" value="住客泳池"> 🏊 住客泳池</label>
                        <label class="feature-checkbox"><input type="checkbox" name="feature" value="健身設施"> 🏋️ 健身設施</label>
                        <label class="feature-checkbox"><input type="checkbox" name="feature" value="停車位"> 🚗 停車位</label>
                        <label class="feature-checkbox"><input type="checkbox" name="feature" value="住客會所"> 🏠 住客會所</label>
                        <label class="feature-checkbox"><input type="checkbox" name="feature" value="高級裝修"> ✨ 高級裝修</label>
                        <label class="feature-checkbox"><input type="checkbox" name="feature" value="實用率高"> 📏 實用率高</label>
                        <label class="feature-checkbox"><input type="checkbox" name="feature" value="寧靜舒適"> 🤫 寧靜舒適</label>
                        <label class="feature-checkbox"><input type="checkbox" name="feature" value="連露台"> 🌿 連露台</label>
                        <label class="feature-checkbox"><input type="checkbox" name="feature" value="寵物友善"> 🐾 寵物友善</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>影片網址 (Video URL)</label>
                    <input type="url" id="propVideo" placeholder="https://youtube.com/...">
                </div>

                <!-- Premium Promotion -->
                <div id="premiumPromo" style="display: none; background: rgba(255, 215, 0, 0.05); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 16px; padding: 20px; margin-top: 30px;">
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <div style="width: 50px; height: 50px; background: rgba(255, 215, 0, 0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-crown" style="color: #ffd700; font-size: 1.5rem;"></i>
                        </div>
                        <div>
                            <h4 style="color: #ffd700;">升級為精選樓盤</h4>
                            <p style="font-size: 0.8rem; color: #94a3b8;">置頂曝光、專屬展示標籤，提升 5 倍查詢量。</p>
                        </div>
                    </div>
                    <button type="button" class="btn-primary" style="width: 100%; margin-top: 15px; background: #ffd700; color: #000; font-weight: bold; border: none;"
                        onclick="window.location.href='/payment.html?id=' + propId">
                        立即升級
                    </button>
                </div>

                <div class="btn-grid">
                    <button type="button" class="btn-outline" onclick="window.location.href='/login.html'">取消</button>
                    <button type="submit" id="submitBtn" class="btn-primary">儲存所有更改</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="toast">Message</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const propId = urlParams.get('id');
        let currentProp = null;
        let galleryItems = []; // Array of image URLs
        let pickerMap, pickerMarker;

        if (!propId) window.location.href = '/login.html';

        // Initialize Map
        function initMap(lat = 22.3193, lng = 114.1694) {
            if (pickerMap) return;
            pickerMap = L.map('mapPicker').setView([lat, lng], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(pickerMap);

            pickerMarker = L.marker([lat, lng], { draggable: true }).addTo(pickerMap);
            
            pickerMarker.on('dragend', function() {
                const pos = pickerMarker.getLatLng();
                document.getElementById('propLat').value = pos.lat.toFixed(6);
                document.getElementById('propLng').value = pos.lng.toFixed(6);
            });

            pickerMap.on('click', function(e) {
                pickerMarker.setLatLng(e.latlng);
                document.getElementById('propLat').value = e.latlng.lat.toFixed(6);
                document.getElementById('propLng').value = e.latlng.lng.toFixed(6);
            });
        }

        function syncMapFromInputs() {
            const lat = parseFloat(document.getElementById('propLat').value);
            const lng = parseFloat(document.getElementById('propLng').value);
            if (!isNaN(lat) && !isNaN(lng)) {
                pickerMarker.setLatLng([lat, lng]);
                pickerMap.setView([lat, lng]);
            }
        }

        async function lookupAddress() {
            const area = document.getElementById('propArea').value;
            const location = document.getElementById('propLocation').value;
            if (!location) return showToast("請先輸入地點");

            const query = `${location}, ${area === 'HK' ? 'Hong Kong' : area}`;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await res.json();
                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    document.getElementById('propLat').value = lat;
                    document.getElementById('propLng').value = lon;
                    pickerMap.setView([lat, lon], 16);
                    pickerMarker.setLatLng([lat, lon]);
                    showToast("定位成功！");
                } else {
                    showToast("找不到地點，請手動標記。");
                }
            } catch (err) { showToast("定位出錯。"); }
        }

        // Gallery Management
        function renderGallery() {
            const container = document.getElementById('gallerySortable');
            container.innerHTML = galleryItems.map((url, index) => `
                <div class="gallery-item" data-url="${url}">
                    <img src="${url}" alt="Gallery ${index}">
                    <button type="button" class="remove-btn" onclick="removeImage(${index})"><i class="fas fa-times"></i></button>
                    <div class="sort-handle">${index === 0 ? '主圖' : index + 1}</div>
                </div>
            `).join('');

            // Init Sortable
            new Sortable(container, {
                animation: 150,
                onEnd: function() {
                    const newItems = [];
                    container.querySelectorAll('.gallery-item').forEach(el => {
                        newItems.push(el.dataset.url);
                    });
                    galleryItems = newItems;
                    renderGallery();
                }
            });
        }

        function removeImage(index) {
            galleryItems.splice(index, 1);
            renderGallery();
        }

        async function handleNewPhotos(input) {
            if (!input.files.length) return;
            const status = document.getElementById('uploadStatus');
            status.textContent = `正在上傳 ${input.files.length} 張相片...`;
            
            try {
                for (let i = 0; i < input.files.length; i++) {
                    const url = await uploadImage(input.files[i], i + 1, input.files.length);
                    galleryItems.push(url);
                }
                status.textContent = "上傳成功！";
                renderGallery();
            } catch (err) {
                showToast("上傳失敗");
                status.textContent = "";
            }
            input.value = ''; // Reset input
        }

        async function loadProperty() {
            try {
                const response = await fetch(`${API_BASE}/api/properties/${propId}`);
                if (response.ok) {
                    const prop = await response.json();
                    currentProp = prop;

                    // Basic Info
                    document.getElementById('propTitle').value = prop.title.zh || prop.title;
                    document.getElementById('propTitleEN').value = prop.title.en || '';
                    document.getElementById('propTitleCN').value = prop.title.cn || '';
                    document.getElementById('propTitleJP').value = prop.title.jp || '';

                    document.getElementById('propLocation').value = prop.location.zh || prop.location;
                    document.getElementById('propLocationEN').value = prop.location.en || '';
                    document.getElementById('propLocationCN').value = prop.location.cn || '';
                    document.getElementById('propLocationJP').value = prop.location.jp || '';

                    document.getElementById('propArea').value = prop.area || 'HK';
                    document.getElementById('propType').value = prop.type;
                    
                    let cleanedPrice = prop.price.replace('HK$ ', '').replace('¥ ', '').replace('$ ', '').replace('/mo', '').replace(/,/g, '');
                    document.getElementById('propPrice').value = cleanedPrice;

                    document.getElementById('propBeds').value = prop.beds;
                    document.getElementById('propBaths').value = prop.baths;
                    document.getElementById('propSqft').value = prop.sqft;
                    document.getElementById('propVideo').value = prop.video || '';

                    // Map
                    const lat = prop.lat || 22.3193;
                    const lng = prop.lng || 114.1694;
                    document.getElementById('propLat').value = lat;
                    document.getElementById('propLng').value = lng;
                    initMap(lat, lng);

                    // Gallery
                    galleryItems = [prop.image, ...(prop.images || [])].filter(url => url && url.trim() !== '');
                    renderGallery();

                    // Features
                    if (prop.features) {
                        const featList = prop.features.split(',');
                        document.querySelectorAll('input[name="feature"]').forEach(cb => {
                            if (featList.includes(cb.value)) cb.checked = true;
                        });
                    }

                    if (!prop.is_premium) document.getElementById('premiumPromo').style.display = 'block';
                    updateFormLabels(prop.area || 'HK');
                }
            } catch (e) { console.error(e); }
        }

        function updateFormLabels(region) {
            const titleLbl = document.getElementById('lblTitle');
            const locLbl = document.getElementById('lblLocation');
            const titleInput = document.getElementById('propTitle');
            const locInput = document.getElementById('propLocation');
            const propDistrict = document.getElementById('propDistrict');

            // Update Districts Dropdown
            if (propDistrict) {
                const currentDist = currentProp?.location?.en || '';
                propDistrict.innerHTML = '<option value="">-- 選擇地區 (Select District) --</option>';
                const districts = REGIONAL_DISTRICTS[region] || [];
                districts.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.en;
                    opt.dataset.zh = d.zh;
                    opt.dataset.cn = d.cn;
                    opt.dataset.jp = d.jp;
                    opt.dataset.en = d.en;
                    opt.innerText = `${d.zh} (${d.en})`;
                    if (currentDist.includes(d.en)) opt.selected = true;
                    propDistrict.appendChild(opt);
                });
            }

            if (region === 'JP') {
                titleLbl.innerText = "物業名稱 (Property Title - JP)";
                locLbl.innerText = "詳細地點 (Detailed Location - JP)";
                titleInput.placeholder = "例：東京 渋谷区 高級マンション";
                locInput.placeholder = "例：1-1-1 Nishi-Shinjuku";
            } else if (region === 'USA') {
                titleLbl.innerText = "Property Title (English)";
                locLbl.innerText = "Detailed Location (English)";
                titleInput.placeholder = "e.g. Luxury Apartment in Manhattan";
                locInput.placeholder = "e.g. 5th Ave, New York";
            } else if (region === 'China') {
                titleLbl.innerText = "物业名称 (Property Title - CN)";
                locLbl.innerText = "详细地点 (Detailed Location - CN)";
                titleInput.placeholder = "例如：上海 浦东新区 豪宅";
                locInput.placeholder = "例如：浦东新区 某某路 123号";
            } else {
                titleLbl.innerText = "物業名稱 (Property Title - HK)";
                locLbl.innerText = "詳細地點 (Detailed Location - HK)";
                titleInput.placeholder = "例如：西九龍 凱旋門 高層單位";
                locInput.placeholder = "例如：柯士甸道 1 號";
            }
        }

        document.getElementById('propArea').addEventListener('change', (e) => updateFormLabels(e.target.value));

        document.getElementById('propDistrict').addEventListener('change', (e) => {
            const opt = e.target.options[e.target.selectedIndex];
            if (!opt.value) return;
            // Also set initial value of detail location if empty
            const locInput = document.getElementById('propLocation');
            if (!locInput.value || locInput.value === currentProp?.location?.zh) {
                // If it was just the district name before, or empty, let's reset it to the new district name
                // so the user can then add the specific street
                locInput.value = opt.dataset.zh;
            }
        });

        document.getElementById('editForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 正在儲存...';

            const areaValue = document.getElementById('propArea').value;
            const typeValue = document.getElementById('propType').value;
            const priceInput = document.getElementById('propPrice').value;
            
            let currency = areaValue === 'USA' ? '$ ' : (areaValue === 'HK' ? 'HK$ ' : '¥ ');
            let finalPrice = currency + priceInput + (typeValue === 'rent' ? '/mo' : '');

            const selectedFeatures = Array.from(document.querySelectorAll('input[name="feature"]:checked')).map(cb => cb.value).join(',');

            const locValue = document.getElementById('propLocation').value;
            const distSelect = document.getElementById('propDistrict');
            const distOpt = distSelect.options[distSelect.selectedIndex];
            
            let locObj = { en: locValue, zh: locValue, cn: locValue, jp: locValue };
            if (distOpt && distOpt.value) {
                locObj = {
                    en: `${locValue}, ${distOpt.dataset.en}`,
                    zh: `${distOpt.dataset.zh} ${locValue}`,
                    cn: `${distOpt.dataset.cn} ${locValue}`,
                    jp: `${distOpt.dataset.jp} ${locValue}`
                };
            }

            const updatedListing = {
                title: { 
                    en: document.getElementById('propTitleEN').value || document.getElementById('propTitle').value, 
                    zh: document.getElementById('propTitle').value,
                    cn: document.getElementById('propTitleCN').value || document.getElementById('propTitle').value,
                    jp: document.getElementById('propTitleJP').value || document.getElementById('propTitle').value
                },
                location: locObj,
                price: finalPrice,
                type: typeValue,
                beds: parseInt(document.getElementById('propBeds').value) || 0,
                baths: parseInt(document.getElementById('propBaths').value) || 0,
                sqft: parseInt(document.getElementById('propSqft').value) || 0,
                image: galleryItems[0] || '',
                images: galleryItems.slice(1),
                video: document.getElementById('propVideo').value,
                area: areaValue,
                features: selectedFeatures,
                lat: parseFloat(document.getElementById('propLat').value) || 0,
                lng: parseFloat(document.getElementById('propLng').value) || 0
            };

            try {
                const res = await fetch(`${API_BASE}/api/properties/${propId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedListing)
                });
                if (res.ok) {
                    showToast("更新成功！");
                    setTimeout(() => window.location.href = '/login.html', 1500);
                } else {
                    showToast("更新失敗");
                }
            } catch (err) {
                showToast("連線錯誤");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = '儲存所有更改';
            }
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            toast.classList.add('show');
            setTimeout(() => {
                toast.style.display = 'none';
                toast.classList.remove('show');
            }, 3000);
        }

        loadProperty();
    </script>
</body>

</html>
