<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 找不到頁面 | 88loft</title>
    <link rel="stylesheet" href="/style.css?v=12">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0d0f17;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        .error-container {
            text-align: center;
            position: relative;
            z-index: 2;
            padding: 40px;
            max-width: 600px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 60px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .error-code {
            font-size: 10rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, var(--accent-color), #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            letter-spacing: -5px;
            filter: drop-shadow(0 10px 20px rgba(114, 50, 242, 0.3));
        }

        h2 {
            font-size: 2.2rem;
            margin: 20px 0 15px;
            color: #fff;
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 16px 35px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(114, 50, 242, 0.2);
        }

        .btn-home:hover {
            background: var(--accent-hover);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 30px rgba(114, 50, 242, 0.4);
        }

        /* Decorative background elements */
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(114, 50, 242, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: 1;
            filter: blur(50px);
        }

        .glow-1 { top: -200px; left: -200px; }
        .glow-2 { bottom: -200px; right: -200px; }

        .floating-icon {
            font-size: 3rem;
            color: rgba(255,255,255,0.05);
            position: absolute;
            z-index: 1;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .icon-1 { top: 15%; left: 10%; animation-delay: 0s; }
        .icon-2 { top: 25%; right: 15%; animation-delay: 2s; }
        .icon-3 { bottom: 20%; left: 20%; animation-delay: 4s; }
        .icon-4 { bottom: 15%; right: 10%; animation-delay: 1s; }

    </style>
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <i class="fas fa-home floating-icon icon-1"></i>
    <i class="fas fa-key floating-icon icon-2"></i>
    <i class="fas fa-building floating-icon icon-3"></i>
    <i class="fas fa-map-marker-alt floating-icon icon-4"></i>

    <div class="error-container">
        <div class="glass-card">
            <h1 class="error-code">404</h1>
            <h2>Oops! 迷路了嗎？</h2>
            <p>這間房子可能已經被搬走了，或者地址有誤。<br>別擔心，讓我們帶您回到首頁繼續搵樓。</p>
            <a href="/hk.html" class="btn-home">
                <i class="fas fa-arrow-left"></i> 回到首頁
            </a>
        </div>
    </div>

    <script>
        // Subtle parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const icons = document.querySelectorAll('.floating-icon');
            const x = (window.innerWidth - e.pageX) / 50;
            const y = (window.innerHeight - e.pageY) / 50;
            
            icons.forEach(icon => {
                icon.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>
</body>
</html>
