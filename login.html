<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Estates - User Login & Add Listing</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="utils.js?v=10"></script>
    <script src="districts.js"></script>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Facebook SDK -->
    <script>
        window.fbAsyncInit = function() {
            FB.init({ appId: '706773323651974', cookie: true, xfbml: true, version: 'v19.0' });
        };
    </script>
    <script async defer src="https://connect.facebook.net/en_US/sdk.js"></script>
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
            background: radial-gradient(circle at top right, rgba(114, 50, 242, 0.15), transparent 40%),
                radial-gradient(circle at bottom left, rgba(64, 16, 163, 0.15), transparent 40%);
        }

        .auth-card {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 20px;
            position: relative;
            z-index: 9999;
        }

        .auth-card h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .auth-card p {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .toggle-auth {
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
        }

        .toggle-auth a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        /* Dashboard Styles */
        .dashboard-container {
            display: none;
            max-width: 1200px;
            margin: 100px auto;
            padding: 20px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .add-listing-card {
            padding: 30px;
            border-radius: 16px;
        }

        .my-listings .listing-item {
            display: flex;
            gap: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 15px;
            align-items: center;
        }

        .listing-item img {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            object-fit: cover;
        }

        .listing-info h3 {
            margin-bottom: 5px;
        }

        .listing-actions {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }

        .btn-edit-mode {
            background: linear-gradient(135deg, #ffd700, #ff8c00) !important;
            color: #1a1a2e !important;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .feature-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #94a3b8;
            cursor: pointer;
        }

        .feature-checkbox input {
            width: auto;
            cursor: pointer;
        }

        /* Mobile Bottom Nav */
        @media (max-width: 768px) {
            .dashboard-tabs {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: rgba(15, 23, 42, 0.95);
                backdrop-filter: blur(15px);
                z-index: 1000;
                margin: 0;
                padding: 10px 0;
                box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.5);
                display: flex;
                justify-content: space-around;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }

            .tab-btn {
                flex-direction: column;
                font-size: 0.7rem;
                gap: 5px;
                padding: 5px;
                background: transparent;
                border: none;
            }

            .dashboard-container {
                padding-bottom: 80px;
            }
        }

        /* Inquiry Item Styles */
        .inquiry-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .inquiry-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .inquiry-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .inquiry-sender {
            font-weight: 600;
            color: var(--accent-hover);
        }

        .inquiry-date {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .inquiry-msg {
            font-style: italic;
            color: #cbd5e1;
            margin: 10px 0;
            line-height: 1.4;
        }

        .inquiry-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: #94a3b8;
            align-items: center;
        }

        .inquiry-meta i {
            margin-right: 5px;
            color: var(--accent-color);
        }
        /* Social Buttons */
        .social-login-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        .social-btn {
            width: 100%;
            padding: 13px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .social-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
        }
        .social-btn:hover::before { background: rgba(255,255,255,0.06); }
        .social-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
        .social-btn:active { transform: scale(0.99); }
        .social-btn-google { border-color: rgba(234,67,53,0.3); }
        .social-btn-google:hover { border-color: #ea4335; box-shadow: 0 6px 20px rgba(234,67,53,0.2); }
        .social-btn-facebook { border-color: rgba(24,119,242,0.3); }
        .social-btn-facebook:hover { border-color: #1877f2; box-shadow: 0 6px 20px rgba(24,119,242,0.2); }
        .social-btn-apple { border-color: rgba(255,255,255,0.2); }
        .social-btn-apple:hover { border-color: rgba(255,255,255,0.5); }
        .social-btn img.social-icon { width: 20px; height: 20px; }
        .social-btn i { font-size: 1.15rem; }
        .social-btn-loader { display: none; }
        .social-btn.loading .social-btn-text { display: none; }
        .social-btn.loading .social-btn-loader { display: inline-block; }

        .or-divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 4px 0 20px;
            color: #4b5563;
            font-size: 0.82rem;
        }
        .or-divider::before, .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }

        .provider-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(114,50,242,0.15);
            border: 1px solid rgba(114,50,242,0.3);
            color: var(--accent-hover);
            font-size: 0.72rem;
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 8px;
            font-weight: 600;
        }
        .error-message {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #f87171;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 10px;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar glass">
        <div class="logo">88精選樓盤</div>
        <ul class="nav-links" style="margin-left: auto;">
            <li><a href="index.html">返回主頁</a></li>
        </ul>
    </nav>

    <!-- Auth View -->
    <div class="login-container" id="authView">
        <div class="auth-card glass-dark">
            <div style="text-align:center; margin-bottom: 24px;">
                <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:8px;">
                    <img src="logo.png" alt="88loft" style="height:36px; border-radius:8px;">
                    <span style="font-size:1.6rem; font-weight:800;">88loft</span>
                </div>
                <h2 id="formTitle" style="font-size:1.6rem; margin-bottom:6px;">歡迎回來</h2>
                <p id="formDesc" style="color:#94a3b8; font-size:0.9rem; margin-bottom:0;">登入以管理您的物業及刊登資訊。</p>
            </div>

            <!-- Social Login Buttons -->
            <div class="social-login-section" id="socialLoginSection">
                <!-- Google -->
                <button class="social-btn social-btn-google" id="googleBtn" onclick="loginWithGoogle()">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#EA4335" d="M5.266 9.765A7.077 7.077 0 0 1 12 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3C17.782 1.145 15.055 0 12 0 7.27 0 3.198 2.698 1.24 6.65l4.026 3.115z"/>
                        <path fill="#34A853" d="M16.04 18.013C14.956 18.647 13.546 19.09 12 19.09c-3.033 0-5.606-1.94-6.634-4.66l-4.052 3.128C3.252 21.325 7.311 24 12 24c2.951 0 5.752-1.08 7.84-3.027l-3.8-2.96z"/>
                        <path fill="#4A90D9" d="M19.84 20.973C22.012 18.95 23.454 15.9 23.454 12c0-.706-.085-1.39-.241-2.045H12v4.5h6.436c-.29 1.52-1.09 2.776-2.224 3.6l3.628 2.918z"/>
                        <path fill="#FBBC05" d="M5.366 14.43A7.156 7.156 0 0 1 4.909 12c0-.864.159-1.693.434-2.462L1.24 6.65A11.94 11.94 0 0 0 0 12c0 1.916.45 3.73 1.248 5.34l4.118-2.91z"/>
                    </svg>
                    <span class="social-btn-text">以 Google 繼續</span>
                    <i class="fas fa-spinner fa-spin social-btn-loader"></i>
                </button>

                <!-- Facebook -->
                <button class="social-btn social-btn-facebook" id="facebookBtn" onclick="loginWithFacebook()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
                        <path d="M24 12.073C24 5.445 18.627 0 12 0S0 5.445 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.413c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.234 2.686.234v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
                    </svg>
                    <span class="social-btn-text">以 Facebook 繼續</span>
                    <i class="fas fa-spinner fa-spin social-btn-loader"></i>
                </button>

                <!-- Apple (UI only — requires Apple developer account) -->
                <button class="social-btn social-btn-apple" id="appleBtn" onclick="loginWithApple()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                        <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.029 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701z"/>
                    </svg>
                    <span class="social-btn-text">以 Apple 繼續</span>
                    <i class="fas fa-spinner fa-spin social-btn-loader"></i>
                </button>
            </div>

            <div class="or-divider" id="orDivider">或以電郵登入</div>

            <div id="authErrorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <form id="authForm">
                <div class="form-group" id="nameGroup" style="display: none;">
                    <label>全名</label>
                    <input type="text" id="nameInput" placeholder="例如：陳大文">
                </div>
                <div class="form-group">
                    <label>電子郵件</label>
                    <input type="email" id="emailInput" placeholder="example@mail.com">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="passwordInput" placeholder="••••••••">
                </div>
                <div class="form-group" id="tokenGroup" style="display: none;">
                    <label>重設驗證碼</label>
                    <input type="text" id="tokenInput" placeholder="輸入 6 位驗證碼">
                </div>
                <button type="button" class="btn-primary submit-btn" id="actionBtn" onclick="handleAuth(event)">登入</button>
            </form>

            <div id="forgotPasswordLink" style="text-align: center; margin-top: 20px;">
                <button type="button" class="link-btn" onclick="toggleForgotMode(event)" style="background:none; border:none; color: #94a3b8; font-size: 1rem; cursor: pointer; text-decoration: underline;">忘記密碼？</button>
            </div>

            <div class="toggle-auth">
                <span id="toggleText">還沒有帳戶？ </span>
                <a href="#" id="toggleLink" onclick="toggleMode(event)">立即註冊</a>
            </div>
        </div>
    </div>

    <!-- Dashboard View (Shown after login) -->
    <div class="dashboard-container" id="dashboardView">
        <div class="dashboard-header">
            <div>
                <h2>歡迎，<span id="userNameDisplay">用戶</span>!</h2>
                <p>管理您的房地產組合及設置。</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-outline" onclick="window.location.href='index.html'"><i class="fas fa-home"></i>
                    返回首頁</button>
                <button class="btn-outline" onclick="logout()">登出 <i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="dashboard-stat-box">
                <h4>刊登中樓盤</h4>
                <p class="stat-val" id="statListings">0</p>
            </div>
            <div class="dashboard-stat-box">
                <h4>收藏夾物業</h4>
                <p class="stat-val" id="statFavorites">0</p>
            </div>
            <div class="dashboard-stat-box">
                <h4>累計詢盤</h4>
                <p class="stat-val" id="statInquiries">0</p>
            </div>
            <div class="dashboard-stat-box">
                <h4>帳戶狀態</h4>
                <p class="stat-val" style="color: #ffd700;">尊貴會員</p>
            </div>
        </div>

        <div class="dashboard-tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'listingsTab')"><i class="fas fa-list-ul"></i>
                我的刊登</button>
            <button class="tab-btn" onclick="switchTab(event, 'favoritesTab')"><i class="fas fa-heart"></i>
                我的收藏</button>
            <button class="tab-btn" onclick="switchTab(event, 'inquiriesTab')"><i class="fas fa-envelope-open-text"></i>
                收件箱</button>
            <button class="tab-btn" onclick="switchTab(event, 'profileTab')"><i class="fas fa-user-circle"></i>
                個人資料</button>
        </div>

        <!-- My Listings Tab -->
        <div id="listingsTab" class="tab-content active">
            <div class="dashboard-grid">
                <!-- Add Listing Form -->
                <div class="add-listing-card glass">
                    <h3><i class="fas fa-plus-circle"></i> 刊登新樓盤</h3>
                    <p style="color: #94a3b8; margin-bottom: 20px; font-size: 0.9rem;">填寫以下資料以發佈您的物業資訊。</p>

                    <form id="addListingForm" onsubmit="addListing(event)">
                        <div class="form-group">
                            <label>地區區域 (Region)</label>
                            <select id="propArea" required style="border: 2px solid var(--accent-color); background: #1e293b; color: white;">
                                <option value="HK" style="background: #1e293b; color: white;">香港 (Hong Kong)</option>
                                <option value="JP" style="background: #1e293b; color: white;">日本 (Japan)</option>
                                <option value="USA" style="background: #1e293b; color: white;">美國 (USA)</option>
                                <option value="China" style="background: #1e293b; color: white;">中國內地 (Mainland China)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label id="lblTitle">物業名稱 (Property Title)</label>
                            <input type="text" id="propTitle" placeholder="例如：西九龍 凱旋門 高層單位" required>
                            <input type="hidden" id="propTitleCN">
                            <input type="hidden" id="propTitleEN">
                            <input type="hidden" id="propTitleJP">
                        </div>

                        <div class="form-group">
                            <label id="lblDistrict">地區 (District)</label>
                            <select id="propDistrict" style="background: #1e293b; color: white; border: 1px solid rgba(255,255,255,0.2);">
                                <option value="">-- 選擇地區 (Select District) --</option>
                            </select>
                        </div>

                        <div class="form-group" style="position: relative;">
                            <label id="lblLocation">地點 (Location)</label>
                            <input type="text" id="propLocation" placeholder="例如：尖沙咀 柯士甸道" required autocomplete="off">
                            <div id="addressSuggestions" class="suggestions-dropdown" style="display:none; position:absolute; top:100%; left:0; right:0; background:#1e293b; border:1px solid rgba(255,255,255,0.1); border-radius:8px; z-index:1000; max-height:200px; overflow-y:auto; margin-top:5px; box-shadow:0 10px 25px rgba(0,0,0,0.5);"></div>
                            <input type="hidden" id="propLocationCN">
                            <input type="hidden" id="propLocationEN">
                            <input type="hidden" id="propLocationJP">
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label>種類 (Type)</label>
                                <select id="propType" required style="background: #1e293b; color: white; border: 1px solid rgba(255,255,255,0.2);">
                                    <option value="rent" style="background: #1e293b; color: white;">租盤 (Rent)</option>
                                    <option value="sale" style="background: #1e293b; color: white;">售盤 (Sale)</option>
                                    <option value="commercial" style="background: #1e293b; color: white;">商業 (Commercial)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>價格 (Price)</label>
                                <input type="text" id="propPrice" placeholder="例如：50000" required>
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label>優惠價格 (Discount Price)</label>
                                <input type="text" id="propDiscountPrice" placeholder="例如：45000 (可不填)">
                            </div>
                            <div class="form-group">
                                <label>優惠至 (Discount Until)</label>
                                <input type="date" id="propDiscountUntil">
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label>房間 (Beds)</label>
                                <input type="number" id="propBeds" min="0" value="1" required>
                            </div>
                            <div class="form-group">
                                <label>廁所 (Baths)</label>
                                <input type="number" id="propBaths" min="0" value="1" required>
                            </div>
                            <div class="form-group">
                                <label>呎數 (Sqft)</label>
                                <input type="number" id="propSqft" min="0" value="500" required>
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label>緯度 (Latitude)</label>
                                <input type="number" id="propLat" step="any" placeholder="22.3193" oninput="syncDashMapFromInputs()">

    <!-- Notification Toast -->
    <div class="toast" id="toast"
        style="position: fixed; bottom: 20px; right: 20px; background: var(--accent-color); color: white; padding: 15px 25px; border-radius: 8px; display: none; z-index: 9999; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
        資訊提示
    </div>

    <script>
        // Error handling for debugging on mobile/no-console
        window.onerror = function (msg, url, line) {
            showToast("系統錯誤: " + msg + " (行: " + line + ")");
        };

        let currentMode = 'login'; // 'login', 'signup', 'forgot', 'reset'
        let currentUser = null;

        let userListings = [];
        let userInquiries = [];

        async function loadUserListings() {
            if (!currentUser || !currentUser.id) return;
            try {
                const response = await fetch(API_BASE + `/api/properties?user_id=${currentUser.id}`);
                if (response.ok) {
                    userListings = await response.json();
                    document.getElementById('statListings').textContent = userListings.length;
                    renderUserListings();
                }
            } catch (e) {
                console.error("Could not load user properties from DB", e);
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function toggleMode(e) {
            if (e) e.preventDefault();
            console.log("toggleMode clicked, current:", currentMode);
            if (currentMode === 'signup') {
                currentMode = 'login';
            } else {
                currentMode = 'signup';
            }
            hideError();
            updateUIForMode();
        }

        function toggleForgotMode(e) {
            if (e) e.preventDefault();
            console.log("toggleForgotMode clicked, current:", currentMode);
            if (currentMode === 'forgot' || currentMode === 'reset') {
                currentMode = 'login';
            } else {
                currentMode = 'forgot';
            }
            hideError();
            updateUIForMode();
        }

        function showError(msg) {
            const errBox = document.getElementById('authErrorMessage');
            const errText = document.getElementById('errorText');
            if (errBox && errText) {
                errText.textContent = msg;
                errBox.style.display = 'flex';
                // Trigger shake animation
                errBox.style.animation = 'none';
                errBox.offsetHeight; // trigger reflow
                errBox.style.animation = null;
            }
            showToast(msg);
        }

        function hideError() {
            const errBox = document.getElementById('authErrorMessage');
            if (errBox) errBox.style.display = 'none';
        }

        function updateUIForMode() {
            const formTitle = document.getElementById('formTitle');
            const formDesc = document.getElementById('formDesc');
            const nameGroup = document.getElementById('nameGroup');
            const tokenGroup = document.getElementById('tokenGroup');
            const actionBtn = document.getElementById('actionBtn');
            const toggleText = document.getElementById('toggleText');
            const toggleLink = document.getElementById('toggleLink');
            const passInput = document.getElementById('passwordInput');
            const forgotLink = document.getElementById('forgotPasswordLink');

            nameGroup.style.display = 'none';
            tokenGroup.style.display = 'none';
            passInput.parentElement.style.display = 'block';
            forgotLink.style.display = 'block';
            actionBtn.style.background = ""; // Reset style
            actionBtn.style.height = ""; // Reset height

            if (currentMode === 'login') {
                formTitle.textContent = "歡迎回來";
                formDesc.textContent = "登入以管理您的物業及刊登資訊。";
                actionBtn.textContent = "登入";
                toggleText.textContent = "還沒有帳戶？ ";
                toggleLink.textContent = "立即註冊";
                passInput.required = true;
            } else if (currentMode === 'signup') {
                formTitle.textContent = "建立新帳戶";
                formDesc.textContent = "加入我們以開始刊登您的物業。";
                nameGroup.style.display = 'block';
                actionBtn.textContent = "註冊";
                toggleText.textContent = "已有帳戶？ ";
                toggleLink.textContent = "立即登入";
                forgotLink.style.display = 'none';
                passInput.required = true;
            } else if (currentMode === 'forgot') {
                formTitle.textContent = "【忘記密碼】模式";
                formDesc.textContent = "請輸入您的 Email 地址，系統將會發送重設驗證碼。";
                passInput.parentElement.style.display = 'none';
                passInput.required = false; 
                actionBtn.textContent = "【點擊這裡】立即發送重設請求";
                actionBtn.style.background = "linear-gradient(135deg, #ff4d4d, #b30000)"; 
                actionBtn.style.height = "65px";
                actionBtn.style.fontSize = "1.3rem";
                toggleText.textContent = "";
                toggleLink.textContent = "返回登入頁面";
                forgotLink.style.display = 'none';
            } else if (currentMode === 'reset') {
                formTitle.textContent = "設置新密碼";
                formDesc.textContent = "驗證碼已發送，請設置您的新登入密碼。";
                tokenGroup.style.display = 'block';
                actionBtn.textContent = "確認更新密碼";
                toggleText.textContent = "";
                toggleLink.textContent = "放棄並返回登入";
                forgotLink.style.display = 'none';
                passInput.required = true;
            }
        }

        async function handleAuth(e) {
            if (e) e.preventDefault();
            
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const name = document.getElementById('nameInput').value;
            const token = document.getElementById('tokenInput').value;

            if (!email) { showToast("請輸入電子郵件"); return; }

            try {
                if (currentMode === 'signup') {
                    if (!password || !name) { showToast("請填寫所有欄位"); return; }
                    const res = await fetch(API_BASE + '/api/auth/signup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, name })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showToast("註冊成功，請登入。");
                        currentMode = 'login';
                        hideError();
                        updateUIForMode();
                    } else {
                        showError(data.message || "註冊失敗");
                    }
                } else if (currentMode === 'login') {
                    if (!password) { showError("請輸入密碼"); return; }
                    const res = await fetch(API_BASE + '/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        hideError();
                        currentUser = data.user;
                        localStorage.setItem('property_user', JSON.stringify(currentUser));
                        loginSuccess();
                    } else {
                        showError(data.message || "登入失敗");
                    }
                } else if (currentMode === 'forgot') {
                    console.log("Requesting reset for:", email);
                    const res = await fetch(API_BASE + '/api/auth/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        hideError();
                        showToast(data.message);
                        currentMode = 'reset';
                        updateUIForMode();
                    } else {
                        showError(data.message || "找不到該電子郵件");
                    }
                } else if (currentMode === 'reset') {
                    if (!password || !token) { showError("請填寫新密碼及驗證碼"); return; }
                    const res = await fetch(API_BASE + '/api/auth/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, token })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        hideError();
                        showToast(data.message);
                        currentMode = 'login';
                        updateUIForMode();
                    } else {
                        showError(data.message || "重設失敗");
                    }
                }
            } catch (err) {
                console.error("Auth Error:", err);
                showError("連線到伺服器失敗: " + err.message);
            }
        }

        function loginSuccess() {
            document.getElementById('userNameDisplay').textContent = currentUser.name;
            document.getElementById('editName').value = currentUser.name;
            // Restore bio if saved
            if (document.getElementById('editBio') && currentUser.bio) {
                document.getElementById('editBio').value = currentUser.bio;
            }
            // Restore custom uploaded photo if exists
            const savedAvatar = localStorage.getItem('property_avatar');
            document.getElementById('profileAvatarLarge').src = savedAvatar
                ? savedAvatar
                : `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.name)}&background=7232f2&color=fff`;
            document.getElementById('authView').style.display = 'none';
            document.getElementById('dashboardView').style.display = 'block';
            loadUserListings();
            loadFavorites();
            // Initialize map picker for the listing form
            setTimeout(() => {
                initDashMapPicker();
                initDashSuggestions();
            }, 500);
            showToast('登入成功！');
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('property_user');
            document.getElementById('authForm').reset();
            document.getElementById('dashboardView').style.display = 'none';
            document.getElementById('authView').style.display = 'flex';
            currentMode = 'login';
            updateUIForMode();
            // Restore social buttons
            document.getElementById('socialLoginSection').style.display = 'flex';
            document.getElementById('orDivider').style.display = 'flex';
            showToast("已登出。");
        }

        /* ── Social Login Handlers ────────────────────────────────── */

        // Shared: call our backend with the provider token
        async function handleSocialLogin(provider, token, btnId) {
            const btn = document.getElementById(btnId);
            if (btn) btn.classList.add('loading');
            try {
                const res = await fetch(API_BASE + '/api/auth/social', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ provider, token })
                });
                const data = await res.json();
                if (res.ok && data.status === 'success') {
                    currentUser = data.user;
                    localStorage.setItem('property_user', JSON.stringify(currentUser));
                    // If Google/FB returned a photo, cache it
                    if (data.user.picture) {
                        localStorage.setItem('property_avatar', data.user.picture);
                    }
                    loginSuccess();
                } else {
                    showToast(data.message || '社交登入失敗，請稍後重試。');
                }
            } catch(e) {
                console.error('Social login error:', e);
                showToast('連線失敗，請檢查網絡後重試。');
            } finally {
                if (btn) btn.classList.remove('loading');
            }
        }

        // ── Google ──
        // REPLACE 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com' with your real Client ID
        const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';

        function loginWithGoogle() {
            if (typeof google === 'undefined' || !google.accounts) {
                showToast('Google SDK 尚未載入，請稍候再試。');
                return;
            }
            const client = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: 'openid email profile',
                callback: async (resp) => {
                    if (resp.error) { showToast('Google 登入取消或失敗'); return; }
                    // For token-based flow, use id_token from One-Tap or credential
                    await handleSocialLogin('google', resp.access_token, 'googleBtn');
                }
            });
            // Also try One Tap / credential flow
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: async (resp) => {
                    await handleSocialLogin('google', resp.credential, 'googleBtn');
                },
                auto_select: false,
                cancel_on_tap_outside: true
            });
            google.accounts.id.prompt((notification) => {
                if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                    // Fallback to OAuth popup
                    client.requestAccessToken();
                }
            });
        }

        // ── Facebook ──
        // REPLACE '1234567890' in the FB.init() call above with your real Facebook App ID
        function loginWithFacebook() {
            if (typeof FB === 'undefined') {
                showToast('Facebook SDK 尚未載入，請稍候再試。');
                return;
            }
            document.getElementById('facebookBtn').classList.add('loading');
            FB.login((response) => {
                if (response.authResponse) {
                    handleSocialLogin('facebook', response.authResponse.accessToken, 'facebookBtn');
                } else {
                    document.getElementById('facebookBtn').classList.remove('loading');
                    showToast('Facebook 登入取消或失敗');
                }
            }, { scope: 'public_profile,email' });
        }

        // ── Apple ──
        function loginWithApple() {
            showToast('Apple 登入需要 Apple Developer 帳戶設定，請聯絡管理員。');
        }

        // Hide social buttons in forgot/reset mode
        function updateUIForMode() {
            const formTitle = document.getElementById('formTitle');
            const formDesc = document.getElementById('formDesc');
            const nameGroup = document.getElementById('nameGroup');
            const tokenGroup = document.getElementById('tokenGroup');
            const actionBtn = document.getElementById('actionBtn');
            const toggleText = document.getElementById('toggleText');
            const toggleLink = document.getElementById('toggleLink');
            const passInput = document.getElementById('passwordInput');
            const forgotLink = document.getElementById('forgotPasswordLink');
            const socialSection = document.getElementById('socialLoginSection');
            const orDivider = document.getElementById('orDivider');

            nameGroup.style.display = 'none';
            tokenGroup.style.display = 'none';
            passInput.parentElement.style.display = 'block';
            forgotLink.style.display = 'block';
            actionBtn.style.background = "";
            actionBtn.style.height = "";
            actionBtn.style.fontSize = "";
            if (socialSection) socialSection.style.display = 'flex';
            if (orDivider) orDivider.style.display = 'flex';

            if (currentMode === 'login') {
                formTitle.textContent = "歡迎回來";

        // --- Map Picker & Address Lookup Logic (integrated from add.html) ---
        let dashPickerMap, dashPickerMarker;
        
        function initDashMapPicker() {
            const mapContainer = document.getElementById('dashMapPicker');
            if (!mapContainer || mapContainer._leaflet_id) return; 
            
            const defaultPos = [22.3193, 114.1694]; // HK center
            dashPickerMap = L.map('dashMapPicker').setView(defaultPos, 13);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(dashPickerMap);

            dashPickerMarker = L.marker(defaultPos, { draggable: true }).addTo(dashPickerMap);

            dashPickerMarker.on('dragend', function(e) {
                const pos = dashPickerMarker.getLatLng();
                updateDashCoords(pos.lat, pos.lng, true);
                reverseGeocodeDash(pos.lat, pos.lng);
            });

            dashPickerMap.on('click', function(e) {
                dashPickerMarker.setLatLng(e.latlng);
                updateDashCoords(e.latlng.lat, e.latlng.lng, true);
                reverseGeocodeDash(e.latlng.lat, e.latlng.lng);
            });
            
            updateDashCoords(defaultPos[0], defaultPos[1], true);
            setTimeout(() => dashPickerMap.invalidateSize(), 500);
        }

        function updateDashCoords(lat, lng, updateInputs = true) {
            if (updateInputs) {
                const latIn = document.getElementById('propLat');
                const lngIn = document.getElementById('propLng');
                if (latIn) latIn.value = parseFloat(lat).toFixed(6);
                if (lngIn) lngIn.value = parseFloat(lng).toFixed(6);
            }
        }

        function syncDashMapFromInputs() {
            const lat = parseFloat(document.getElementById('propLat').value);
            const lng = parseFloat(document.getElementById('propLng').value);
            if (!isNaN(lat) && !isNaN(lng)) {
                const pos = [lat, lng];
                dashPickerMarker.setLatLng(pos);
                dashPickerMap.panTo(pos);
            }
        }

        async function dashLookupAddress() {
            const area = document.getElementById('propArea').value;
            const location = document.getElementById('propLocation').value;
            if (!location) return showToast("請先輸入地點");

            const query = `${location}, ${area === 'HK' ? 'Hong Kong' : area}`;
            showToast("正在定位...");

            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await res.json();
                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    dashPickerMap.setView([lat, lon], 16);
                    dashPickerMarker.setLatLng([lat, lon]);
                    updateDashCoords(lat, lon);
                    showToast("定位成功！");
                } else { showToast("找不到地點，請手動選取"); }
            } catch (err) { showToast("定位服務出錯"); }
        }

        async function reverseGeocodeDash(lat, lng) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
                const data = await res.json();
                if (data && data.display_name) {
                    let shortAddr = data.display_name.split(',').slice(0, 3).join(',').trim();
                    document.getElementById('propLocation').value = shortAddr;
                }
            } catch (e) { console.error("Reverse geocode failed", e); }
        }

        let dashSuggTimeout = null;
        function initDashSuggestions() {
            const locInput = document.getElementById('propLocation');
            const suggContainer = document.getElementById('addressSuggestions');
            if (!locInput || !suggContainer) return;

            locInput.addEventListener('input', function(e) {
                const val = e.target.value.trim();
                clearTimeout(dashSuggTimeout);
                if (val.length < 3) {
                    suggContainer.style.display = 'none';
                    return;
                }

                dashSuggTimeout = setTimeout(async () => {
                    const area = document.getElementById('propArea').value;
                    const query = `${val}, ${area === 'HK' ? 'Hong Kong' : area}`;
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
                        const data = await res.json();
                        if (data && data.length > 0) {
                            suggContainer.innerHTML = data.map(item => `
                                <div class="suggestion-item" style="padding:10px 15px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.05); color:#fff; font-size:0.9rem;" 
                                     onclick="selectDashSuggestion('${item.display_name.replace(/'/g, "\\'")}', ${item.lat}, ${item.lon})">
                                    ${item.display_name}
                                </div>
                            `).join('');
                            suggContainer.style.display = 'block';
                        } else { suggContainer.style.display = 'none'; }
                    } catch (e) { suggContainer.style.display = 'none'; }
                }, 500);
            });
        }

        function selectDashSuggestion(displayName, lat, lng) {
            document.getElementById('propLocation').value = displayName.split(',').slice(0, 3).join(',').trim();
            document.getElementById('addressSuggestions').style.display = 'none';
            if (dashPickerMap) {
                dashPickerMap.setView([lat, lng], 16);
                dashPickerMarker.setLatLng([lat, lng]);
                updateDashCoords(lat, lng);
            }
        }
        window.selectDashSuggestion = selectDashSuggestion;

        // Handle region change to update labels and districts
        document.addEventListener('DOMContentLoaded', () => {
            const propArea = document.getElementById('propArea');
            const propDistrict = document.getElementById('propDistrict');
            
            function updateDistricts(region) {
                if (!propDistrict) return;
                propDistrict.innerHTML = '<option value="">-- 選擇地區 (Select District) --</option>';
                const districts = REGIONAL_DISTRICTS[region] || [];
                districts.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.en; // We'll store EN as key or use the whole object
                    opt.dataset.zh = d.zh;
                    opt.dataset.cn = d.cn;
                    opt.dataset.jp = d.jp;
                    opt.dataset.en = d.en;
                    
                    // Display name based on current language or mixed
                    opt.innerText = `${d.zh} (${d.en})`;
                    propDistrict.appendChild(opt);
                });
            }

            if (propArea) {
                // Init districts
                updateDistricts(propArea.value);

                propArea.addEventListener('change', (e) => {
                    const region = e.target.value;
                    updateDistricts(region);
                    
                    const titleLbl = document.getElementById('lblTitle');
                    const locLbl = document.getElementById('lblLocation');
                    const titleInput = document.getElementById('propTitle');
                    const locInput = document.getElementById('propLocation');

                    if (region === 'JP') {
                        if (titleLbl) titleLbl.innerText = "物業名稱 (Property Title - JP)";
                        if (locLbl) locLbl.innerText = "詳細地點 (Detailed Location - JP)";
                        if (titleInput) titleInput.placeholder = "例：東京 渋谷区 高級マンション";
                        if (locInput) locInput.placeholder = "例：1-1-1 Nishi-Shinjuku";
                    } else if (region === 'USA') {
                        if (titleLbl) titleLbl.innerText = "Property Title (English)";
                        if (locLbl) locLbl.innerText = "Detailed Location (English)";
                        if (titleInput) titleInput.placeholder = "e.g. Luxury Apartment in Manhattan";
                        if (locInput) locInput.placeholder = "e.g. 5th Ave, New York";
                    } else if (region === 'China') {
                        if (titleLbl) titleLbl.innerText = "物业名称 (Property Title - CN)";
                        if (locLbl) locLbl.innerText = "详细地点 (Detailed Location - CN)";
                        if (titleInput) titleInput.placeholder = "例如：上海 浦东新区 豪宅";
                        if (locInput) locInput.placeholder = "例如：浦东新区 某某路 123号";
                    } else {
                        if (titleLbl) titleLbl.innerText = "物業名稱 (Property Title - HK)";
                        if (locLbl) locLbl.innerText = "詳細地點 (Detailed Location - HK)";
                        if (titleInput) titleInput.placeholder = "例如：西九龍 凱旋門 高層單位";
                        if (locInput) locInput.placeholder = "例如：柯士甸道 1 號";
                    }
                });
            }

            if (propDistrict) {
                propDistrict.addEventListener('change', (e) => {
                    const opt = e.target.options[e.target.selectedIndex];
                    if (!opt.value) return;
                    
                    // Auto-fill hidden location fields with district translations
                    document.getElementById('propLocationEN').value = opt.dataset.en;
                    document.getElementById('propLocationCN').value = opt.dataset.cn;
                    document.getElementById('propLocationJP').value = opt.dataset.jp;
                    
                    // Also set initial value of detail location if empty
                    const locInput = document.getElementById('propLocation');
                    if (!locInput.value) {
                        locInput.value = opt.dataset.zh;
                    }
                });
            }
        });

        async function addListing(e) {
            e.preventDefault();
            const uploadStatus = document.getElementById('uploadStatus');
            const submitBtn = document.getElementById('submitListingBtn');
            const preview = document.getElementById('imagePreview');

            let imageUrl = document.getElementById('propImage').value;
            let galleryUrls = [];
            const fileInput = document.getElementById('propFile');

            if (fileInput.files.length > 0) {
                submitBtn.disabled = true;
                uploadStatus.textContent = "正在上傳相片...";
                try {
                    for (let i = 0; i < fileInput.files.length; i++) {
                        const url = await uploadImage(fileInput.files[i], i + 1, fileInput.files.length);
                        if (i === 0 && !imageUrl) { imageUrl = url; } 
                        else { galleryUrls.push(url); }
                    }
                    uploadStatus.textContent = "上傳成功！";
                } catch (err) {
                    showToast("相片上傳失敗");
                    uploadStatus.textContent = "";
                    submitBtn.disabled = false;
                    return;
                }
            }

            const areaValue = document.getElementById('propArea').value;
            const typeValue = document.getElementById('propType').value;
            const priceInput = document.getElementById('propPrice').value;
            
            let currency = "HK$ ";
            if (areaValue === 'JP') currency = "¥ ";
            else if (areaValue === 'USA') currency = "$ ";
            else if (areaValue === 'China') currency = "¥ ";

            let finalPrice = priceInput;
            if (!priceInput.includes('$') && !priceInput.includes('¥')) {
                finalPrice = currency + priceInput + (typeValue === 'rent' ? '/mo' : '');
            }

            const titleValue = document.getElementById('propTitle').value;
            const locValue = document.getElementById('propLocation').value;
            const distSelect = document.getElementById('propDistrict');
            const distOpt = distSelect.options[distSelect.selectedIndex];
            
            let locObj = { en: locValue, zh: locValue, cn: locValue, jp: locValue };
            if (distOpt && distOpt.value) {
                locObj = {
                    en: `${locValue}, ${distOpt.dataset.en}`,
                    zh: `${distOpt.dataset.zh} ${locValue}`,
                    cn: `${distOpt.dataset.cn} ${locValue}`,
                    jp: `${distOpt.dataset.jp} ${locValue}`
                };
            }
            const discountPriceInput = document.getElementById('propDiscountPrice').value;
            let finalDiscountPrice = null;
            if (discountPriceInput) {
                finalDiscountPrice = currency + discountPriceInput + (typeValue === 'rent' ? '/mo' : '');
            }
            const discountUntil = document.getElementById('propDiscountUntil').value;

            const selectedFeatures = Array.from(document.querySelectorAll('input[name="feature"]:checked')).map(cb => cb.value).join(',');

            const newListing = {
                title: { en: titleValue, zh: titleValue, cn: titleValue, jp: titleValue },
                location: locObj,
                price: finalPrice,
                type: typeValue,
                beds: parseInt(document.getElementById('propBeds').value) || 0,
                baths: parseInt(document.getElementById('propBaths').value) || 0,
                sqft: parseInt(document.getElementById('propSqft').value) || 0,
                image: imageUrl || "https://via.placeholder.com/400x250?text=88loft",
                images: galleryUrls,
                video: document.getElementById('propVideo').value,
                area: areaValue,
                features: selectedFeatures,
                lat: parseFloat(document.getElementById('propLat').value) || 0,
                lng: parseFloat(document.getElementById('propLng').value) || 0,
                discount_price: finalDiscountPrice,
                discount_until: discountUntil,
                publish_date: new Date().toISOString(),
                user_id: currentUser.id
            };

            try {
                const res = await fetch(API_BASE + '/api/properties', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newListing)
                });
                if (res.ok) {
                    await loadUserListings();
                    document.getElementById('addListingForm').reset();
                    preview.innerHTML = '';
                    uploadStatus.textContent = "";
                    showToast("樓盤成功發佈！");
                    if (dashPickerMarker) {
                        const defaultPos = [22.3193, 114.1694];
                        dashPickerMarker.setLatLng(defaultPos);
                        dashPickerMap.setView(defaultPos, 13);
                    }
                } else { showToast("發佈失敗"); }
            } catch (e) { showToast("連線錯誤"); } 
            finally { submitBtn.disabled = false; }
        }

                            <i class="fas fa-trash-alt" style="color: #ff4d4d;"></i>
                        </button>
                    </div>
                </div>`;
