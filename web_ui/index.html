<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Agent</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Highlight.js for Code Syntax -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Marked.js for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-background">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#paint0_linear)" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M2 17L12 22L22 17" stroke="url(#paint1_linear)" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M2 12L12 17L22 12" stroke="url(#paint2_linear)" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <defs>
                        <linearGradient id="paint0_linear" x1="2" y1="7" x2="22" y2="7" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#8b5cf6" />
                            <stop offset="1" stop-color="#3b82f6" />
                        </linearGradient>
                        <linearGradient id="paint1_linear" x1="2" y1="19.5" x2="22" y2="19.5"
                            gradientUnits="userSpaceOnUse">
                            <stop stop-color="#8b5cf6" />
                            <stop offset="1" stop-color="#3b82f6" />
                        </linearGradient>
                        <linearGradient id="paint2_linear" x1="2" y1="14.5" x2="22" y2="14.5"
                            gradientUnits="userSpaceOnUse">
                            <stop stop-color="#8b5cf6" />
                            <stop offset="1" stop-color="#3b82f6" />
                        </linearGradient>
                    </defs>
                </svg>
                <h1>Antigravity</h1>
            </div>
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span class="status-text">Ready</span>
            </div>
        </header>

        <main class="chat-container" id="chat-container">
            <div class="message system">
                <div class="content markdown-body">
                    <p>Welcome to <strong>Antigravity AI</strong>. I'm connected to the Gemini API and ready to assist
                        you.</p>
                </div>
            </div>
        </main>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="Message Antigravity..." rows="1" autofocus></textarea>
                <div class="input-actions">
                    <button id="send-btn" class="send-btn" disabled>
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="input-footer">
                Antigravity can make mistakes. Consider verifying important information.
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
