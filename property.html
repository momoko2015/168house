<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>88loft - Property Detail</title>
    <link rel="stylesheet" href="/style.css?v=7">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0a0e1a; color: #e2e8f0; min-height: 100vh; }
        .top-nav {
            background: rgba(17,24,39,0.9); backdrop-filter: blur(10px);
            padding: 15px 30px; display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; z-index: 100;
        }
        .back-btn { color: white; text-decoration: none; background: #7232f2; padding: 8px 18px; border-radius: 20px; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
        .back-btn:hover { background: #5a20cc; }
        .prop-id-badge { color: #94a3b8; font-size: 0.85rem; }

        .property-page { max-width: 1100px; margin: 40px auto; padding: 0 20px 80px; }

        /* Gallery */
        .gallery-main { width: 100%; height: 420px; object-fit: cover; border-radius: 16px; margin-bottom: 12px; }
        .gallery-thumbs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
        .gallery-thumbs img { width: 90px; height: 65px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: border 0.2s; }
        .gallery-thumbs img:hover, .gallery-thumbs img.active { border-color: #7232f2; }

        .detail-grid { display: grid; grid-template-columns: 1fr 340px; gap: 30px; }
        @media(max-width:768px){ .detail-grid { grid-template-columns: 1fr; } }

        .prop-title { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
        .prop-location { color: #94a3b8; font-size: 1rem; margin-bottom: 20px; }
        .prop-location i { color: #7232f2; }

        .stats-row { display: flex; gap: 25px; flex-wrap: wrap; margin-bottom: 25px; padding: 20px; background: rgba(255,255,255,0.04); border-radius: 12px; }
        .stat-item { text-align: center; }
        .stat-item i { color: #7232f2; font-size: 1.4rem; display: block; margin-bottom: 4px; }
        .stat-item span { font-size: 0.85rem; color: #94a3b8; display: block; }
        .stat-item strong { font-size: 1.1rem; }

        .section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 10px; }
        .features-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; }
        .feature-tag { background: rgba(114,50,242,0.15); color: #a78bfa; padding: 5px 14px; border-radius: 20px; font-size: 0.85rem; border: 1px solid rgba(114,50,242,0.3); }

        /* Sticky sidebar */
        .sidebar-card { background: rgba(30,41,59,0.7); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 28px; position: sticky; top: 80px; }
        .sidebar-price { font-size: 2.2rem; font-weight: 800; color: #4ade80; margin-bottom: 5px; }
        .sidebar-type { color: #94a3b8; font-size: 0.95rem; margin-bottom: 20px; }
        .sidebar-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: all 0.2s; }
        .btn-contact { background: #7232f2; color: white; }
        .btn-contact:hover { background: #5a20cc; }
        .btn-share { background: rgba(255,255,255,0.06); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.1); }
        .btn-share:hover { background: rgba(255,255,255,0.12); }

        /* Comments section */
        .comments-section { margin-top: 40px; }
        .comment-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .comment-author { font-weight: 700; margin-bottom: 4px; }
        .comment-date { font-size: 0.8rem; color: #64748b; margin-bottom: 10px; }
        .comment-text { color: #cbd5e1; line-height: 1.6; }
        .comment-form textarea { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px; color: white; font-family: inherit; font-size: 0.95rem; resize: vertical; min-height: 100px; box-sizing: border-box; margin-bottom: 10px; }
        .comment-form input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 14px; color: white; font-family: inherit; font-size: 0.95rem; box-sizing: border-box; margin-bottom: 10px; }
        .comment-form textarea::placeholder, .comment-form input::placeholder { color: #475569; }

        .loading-spinner { text-align: center; padding: 80px 0; color: #94a3b8; font-size: 1.2rem; }
        .error-box { text-align: center; padding: 80px 0; color: #ef4444; }

        .map-fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 99999 !important;
            margin: 0 !important;
            background: #0a0e1a !important;
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="/hk.html" style="display:flex; align-items:center; gap:10px; text-decoration:none;">
        <img src="/logo.png" alt="88loft" style="height:36px; border-radius:6px;">
        <span style="font-size:1.3rem; font-weight:800; background:linear-gradient(45deg,#fff,#94a3b8); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">88loft</span>
    </a>
    <a href="/hk.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回首頁</a>
    <a href="/map.html" id="headerMapLink" class="back-btn" style="background: rgba(255,255,255,0.08); color: #94a3b8;"><i class="fas fa-map-marked-alt"></i> 地圖</a>
    <span class="prop-id-badge" id="propIdBadge">Loading...</span>
</nav>

<div class="property-page">
    <div id="loadingState" class="loading-spinner">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem; color:#7232f2;"></i><br><br>載入樓盤資料...
    </div>
    <div id="errorState" class="error-box" style="display:none;">
        <i class="fas fa-exclamation-circle" style="font-size:3rem;"></i><br><br>
        <h3>找不到此樓盤</h3>
        <p>the property #<span id="errorId"></span> was not found.</p>
        <a href="/hk.html" class="back-btn" style="display:inline-flex; margin-top:20px;">返回首頁</a>
    </div>

    <div id="propertyContent" style="display:none;">
        <div style="position: relative;">
            <img id="mainPhoto" src="" class="gallery-main" alt="Property Photo">
            <div id="videoBtnContainer" style="position: absolute; bottom: 30px; left: 20px; display: none; z-index: 20;">
                <button class="sidebar-btn btn-contact" id="watchVideoBtn" style="background: var(--accent-color); padding: 12px 25px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: auto;">
                    <i class="fas fa-play"></i> Watch Video
                </button>
            </div>
        </div>
        <div class="gallery-thumbs" id="galleryThumbs"></div>

        <!-- Video Modal -->
        <div id="videoModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center;">
            <div style="width:90%; max-width:900px; position:relative;">
                <span id="closeVideo" style="position:absolute; top:-40px; right:0; color:white; font-size:2rem; cursor:pointer;"><i class="fas fa-times"></i></span>
                <div id="videoContainer" style="position:relative; padding-bottom:56.25%; height:0; border-radius:12px; overflow:hidden; background:#000;"></div>
            </div>
        </div>

        <div class="detail-grid">
            <!-- Left column -->
            <div>
                <div class="prop-title" id="propTitle"></div>
                <div class="prop-location" style="display: flex; align-items: center; gap: 10px; cursor: pointer;" onclick="togglePropertyMap()">
                    <span><i class="fas fa-map-marker-alt"></i> <span id="propLocation"></span></span>
                    <span style="font-size: 0.8rem; color: #4ade80; background: rgba(74, 222, 128, 0.1); padding: 4px 10px; border-radius: 20px;"><i class="fas fa-map"></i> 在地圖上確認位置 (Map View)</span>
                </div>
                
                <!-- Embedded Map -->
                <div id="mapWrapper" style="position: relative; margin-bottom: 25px; width: 100%; transition: all 0.3s ease;">
                    <div id="propMapContainer" style="display: block; height: 350px; width: 100%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); transition: height 0.3s ease, border-radius 0.3s ease;"></div>
                    <button id="mapExpandBtn" onclick="toggleMapFullscreen()" style="position: absolute; top: 15px; right: 15px; z-index: 1000; background: rgba(114, 50, 242, 0.9); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); backdrop-filter: blur(4px); display: flex; align-items: center; gap: 8px; font-weight: bold; transition: all 0.2s ease;">
                        <i class="fas fa-expand"></i> 放大地圖
                    </button>
                </div>

                <div class="stats-row">
                    <div class="stat-item">
                        <i class="fas fa-bed"></i>
                        <strong id="propBeds">-</strong>
                        <span>房</span>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-bath"></i>
                        <strong id="propBaths">-</strong>
                        <span>廁</span>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-ruler-combined"></i>
                        <strong id="propSqft">-</strong>
                        <span>呎</span>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-eye"></i>
                        <strong id="propViews">-</strong>
                        <span>瀏覽</span>
                    </div>
                </div>

                <div class="section-label">物業特色</div>
                <div class="features-list" id="propFeatures"></div>

                <!-- Poster info -->
                <div style="background:rgba(255,255,255,0.04); border-radius:12px; padding:18px; margin-top:10px;">
                    <div class="section-label">刊登代理</div>
                    <div style="font-weight:700;" id="propPoster"></div>
                    <div style="color:#94a3b8; font-size:0.85rem;" id="propPosterEmail"></div>
                </div>

                <!-- Comments Section -->
                <div class="comments-section">
                    <h3 style="margin-bottom: 20px;"><i class="fas fa-comments" style="color:#7232f2;"></i> 留言評論</h3>

                    <div id="commentsList"></div>

                    <div class="comment-form" style="margin-top: 20px;">
                        <div class="section-label">發表留言</div>
                        <input type="text" id="commentName" placeholder="您的名字">
                        <textarea id="commentText" placeholder="分享您對此樓盤的看法..."></textarea>
                        <button class="sidebar-btn btn-contact" onclick="submitComment()"><i class="fas fa-paper-plane"></i> 發送留言</button>
                    </div>
                </div>
            </div>

            <!-- Right sidebar -->
            <div>
                <div class="sidebar-card">
                    <div class="sidebar-price" id="sidebarPrice"></div>
                    <div class="sidebar-type" id="sidebarType"></div>
                    <div id="sidebarArea" style="color:#94a3b8; margin-bottom:20px; font-size:0.9rem;"></div>
                    
                    <button class="sidebar-btn btn-contact" onclick="showContactForm()">
                        <i class="fas fa-envelope"></i> 聯絡代理
                    </button>
                    <a href="https://wa.me/85294301551" target="_blank" class="sidebar-btn" style="display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#25D366,#128C7E);color:white;text-decoration:none;margin-bottom:10px;">
                        <i class="fab fa-whatsapp" style="font-size:1.2rem;"></i> WhatsApp 查詢
                    </a>
                    <button class="sidebar-btn btn-share" onclick="shareProperty()">
                        <i class="fas fa-share-alt"></i> 分享此樓盤
                    </button>
                    <button id="sidebarMapBtn" class="sidebar-btn btn-share" onclick="window.location.href='/map.html'">
                        <i class="fas fa-map-marked-alt"></i> 在地圖上查看
                    </button>

                    <div id="contactForm" style="display:none; margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;">
                        <div class="section-label">發送詢問</div>
                        <input type="text" id="inquiryName" placeholder="您的姓名" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px;color:white;font-family:inherit;margin-bottom:8px;box-sizing:border-box;">
                        <input type="email" id="inquiryEmail" placeholder="電子郵件" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px;color:white;font-family:inherit;margin-bottom:8px;box-sizing:border-box;">
                        <textarea id="inquiryMsg" placeholder="您的問題..." rows="3" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px;color:white;font-family:inherit;margin-bottom:8px;box-sizing:border-box;resize:vertical;"></textarea>
                        <button class="sidebar-btn btn-contact" onclick="sendInquiry()"><i class="fas fa-paper-plane"></i> 發送</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Similar Properties Section -->
        <div class="similar-props-section" id="similarPropsSection" style="display:none;">
            <h3>🏘️ 相似推介樓盤</h3>
            <div class="similar-props-scroll" id="similarPropsScroll"></div>
        </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const propId = params.get('id');
    let currentProp = null;
    // In-browser LocalStorage key for comments
    const COMMENTS_KEY = `prop_comments_${propId}`;

    if (!propId) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorState').style.display = 'block';
        document.getElementById('errorId').textContent = '(none)';
    } else {
        document.getElementById('propIdBadge').textContent = `Property #${String(propId).padStart(5, '0')}`;
        document.title = `88loft - Property #${String(propId).padStart(5, '0')}`;
        loadProperty();
    }

    async function loadProperty() {
        try {
            const res = await fetch(`/api/properties/${propId}`);
            if (!res.ok) throw new Error('not found');
            const p = await res.json();
            currentProp = p;
            renderProperty(p);
        } catch (e) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorId').textContent = propId;
        }
    }

    function getLiveViewCount(id) {
        const seed = parseInt(id) || 0;
        const base = 3 + (seed % 17);
        const jitter = Math.floor(Math.random() * 5);
        return base + jitter;
    }

    function renderProperty(p) {
        const title = p.title.zh || p.title.en || 'Property';
        const loc = p.location.zh || p.location.en || '';

        document.title = `88loft - ${title}`;
        document.getElementById('propTitle').textContent = title;
        document.getElementById('propLocation').textContent = loc;
        document.getElementById('propBeds').textContent = p.beds;
        document.getElementById('propBaths').textContent = p.baths;
        document.getElementById('propSqft').textContent = p.sqft?.toLocaleString() || '-';
        document.getElementById('propViews').textContent = p.views || 0;
        document.getElementById('sidebarPrice').textContent = p.price;
        document.getElementById('sidebarType').textContent = p.type === 'rent' ? '租盤' : '售盤';
        document.getElementById('sidebarArea').textContent = p.area ? `地區：${p.area}` : '';
        document.getElementById('propPoster').textContent = p.poster_name;
        document.getElementById('propPosterEmail').textContent = p.poster_email;

        // Update Map Links
        const headerMapLink = document.getElementById('headerMapLink');
        if (headerMapLink) headerMapLink.href = `/map.html?id=${p.id}`;
        const sidebarMapBtn = document.getElementById('sidebarMapBtn');
        if (sidebarMapBtn) sidebarMapBtn.onclick = () => window.location.href = `/map.html?id=${p.id}`;

        // Video
        const videoBtnContainer = document.getElementById('videoBtnContainer');
        if (p.video) {
            videoBtnContainer.style.display = 'block';
            document.getElementById('watchVideoBtn').onclick = () => openVideoModal(p.video, title);
        }

        // Gallery
        const allImgs = [p.image, ...(p.images || [])].filter(Boolean);
        const mainPhoto = document.getElementById('mainPhoto');
        mainPhoto.src = allImgs[0] || 'https://via.placeholder.com/800x420?text=No+Photo';
        mainPhoto.onerror = function(){ this.src='https://via.placeholder.com/800x420?text=No+Photo'; };

        const thumbsEl = document.getElementById('galleryThumbs');
        allImgs.forEach((img, i) => {
            const el = document.createElement('img');
            el.src = img;
            el.onerror = function(){ this.style.display='none'; };
            if (i === 0) el.classList.add('active');
            el.onclick = () => {
                mainPhoto.src = img;
                thumbsEl.querySelectorAll('img').forEach(t => t.classList.remove('active'));
                el.classList.add('active');
            };
            thumbsEl.appendChild(el);
        });

        // Features
        const featsEl = document.getElementById('propFeatures');
        if (p.features) {
            p.features.split(',').forEach(f => {
                if (f.trim()) {
                    const tag = document.createElement('span');
                    tag.className = 'feature-tag';
                    tag.textContent = f.trim();
                    featsEl.appendChild(tag);
                }
            });
        } else {
            featsEl.textContent = '暫無特色標籤';
        }

        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('propertyContent').style.display = 'block';

        // Load comments
        renderComments();

        // Initialize Map if coordinates are available
        if (p.lat && p.lng) {
            initPropertyMap(p.lat, p.lng);
        }
    }

    let propMap = null;
    let mapMarker = null;

    function initPropertyMap(lat, lng) {
        if (propMap) {
            propMap.setView([lat, lng], 16);
            if (mapMarker) mapMarker.setLatLng([lat, lng]);
            return;
        }

        propMap = L.map('propMapContainer', {
            zoomControl: false
        }).setView([lat, lng], 16);
        
        L.control.zoom({ position: 'bottomright' }).addTo(propMap);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(propMap);

        // Custom icon matching the "Red Pin" style
        const customIcon = L.divIcon({
            className: 'custom-pin',
            html: `<div style="width: 24px; height: 24px; background: #ef4444; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.5);"></div>`,
            iconSize: [24, 24],
            iconAnchor: [12, 24]
        });

        mapMarker = L.marker([lat, lng], { icon: customIcon }).addTo(propMap);
    }

    function togglePropertyMap() {
        const wrapper = document.getElementById('mapWrapper');
        if (wrapper.style.display === 'none') {
            wrapper.style.display = 'block';
            if (propMap) {
                setTimeout(() => propMap.invalidateSize(), 100);
            }
        } else {
            wrapper.style.display = 'none';
        }
    }

    function toggleMapFullscreen() {
        const wrapper = document.getElementById('mapWrapper');
        const container = document.getElementById('propMapContainer');
        const btn = document.getElementById('mapExpandBtn');
        
        if (wrapper.classList.contains('map-fullscreen')) {
            wrapper.classList.remove('map-fullscreen');
            container.style.height = '350px';
            container.style.borderRadius = '12px';
            btn.innerHTML = '<i class="fas fa-expand"></i> 放大地圖';
        } else {
            wrapper.classList.add('map-fullscreen');
            container.style.height = '100vh';
            container.style.borderRadius = '0';
            btn.innerHTML = '<i class="fas fa-compress"></i> 縮小地圖';
        }
        
        if (propMap) {
            setTimeout(() => propMap.invalidateSize(), 300);
            
            // Recenter map on marker after resize
            if (mapMarker) {
                setTimeout(() => {
                    propMap.setView(mapMarker.getLatLng(), propMap.getZoom());
                }, 350);
            }
        }
    }

    function openVideoModal(url, title) {
        const modal = document.getElementById('videoModal');
        const container = document.getElementById('videoContainer');
        let videoId = '';
        
        if (url.includes('youtube.com') || url.includes('youtu.be')) {
            if (url.includes('v=')) videoId = url.split('v=')[1].split('&')[0];
            else if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
            else if (url.includes('embed/')) videoId = url.split('embed/')[1].split('?')[0];
            else videoId = url.split('/').pop().split('?')[0];
            
            container.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        } else {
            container.innerHTML = `<video style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" controls autoplay><source src="${url}" type="video/mp4">Your browser does not support the video tag.</video>`;
        }
        
        modal.style.display = 'flex';
    }

    document.getElementById('closeVideo').onclick = () => {
        document.getElementById('videoModal').style.display = 'none';
        document.getElementById('videoContainer').innerHTML = '';
    };

    window.onclick = (e) => {
        const modal = document.getElementById('videoModal');
        if (e.target == modal) {
            modal.style.display = 'none';
            document.getElementById('videoContainer').innerHTML = '';
        }
        // Also handle the contact form close if needed, but keeping it simple for now
    };

    function renderComments() {
        const saved = JSON.parse(localStorage.getItem(COMMENTS_KEY) || '[]');
        const container = document.getElementById('commentsList');
        if (saved.length === 0) {
            container.innerHTML = '<p style="color:#64748b; margin-bottom:20px;">暫時沒有留言，成為第一個留言者！</p>';
            return;
        }
        container.innerHTML = saved.map(c => `
            <div class="comment-box">
                <div class="comment-author"><i class="fas fa-user-circle" style="color:#7232f2;"></i> ${c.name}</div>
                <div class="comment-date">${c.date}</div>
                <div class="comment-text">${c.text}</div>
            </div>
        `).join('');
    }

    function submitComment() {
        const name = document.getElementById('commentName').value.trim();
        const text = document.getElementById('commentText').value.trim();
        if (!name || !text) { alert('請填寫姓名及留言内容'); return; }

        const saved = JSON.parse(localStorage.getItem(COMMENTS_KEY) || '[]');
        saved.unshift({ name, text, date: new Date().toLocaleString('zh-HK') });
        localStorage.setItem(COMMENTS_KEY, JSON.stringify(saved));

        document.getElementById('commentName').value = '';
        document.getElementById('commentText').value = '';
        renderComments();
    }

    function showContactForm() {
        const f = document.getElementById('contactForm');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    }

    async function sendInquiry() {
        const name = document.getElementById('inquiryName').value.trim();
        const email = document.getElementById('inquiryEmail').value.trim();
        const msg = document.getElementById('inquiryMsg').value.trim();
        if (!name || !email || !msg) { alert('請填寫所有欄位'); return; }
        try {
            await fetch('/api/inquiries', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ property_id: propId, name, email, message: msg })
            });
            alert('詢問已發送！代理將盡快聯絡您。');
            document.getElementById('contactForm').style.display = 'none';
        } catch(e) { alert('發送失敗，請重試。'); }
    }

    function shareProperty() {
        if (navigator.share) {
            navigator.share({ title: document.title, url: window.location.href });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert('連結已複製到剪貼簿！');
        }
    }

    // Load similar properties after main property loads
    async function loadSimilarProperties(propId) {
        try {
            const res = await fetch(`/api/properties/similar/${propId}`);
            if (!res.ok) return;
            const similar = await res.json();
            if (!similar || similar.length === 0) return;

            const section = document.getElementById('similarPropsSection');
            const scroll = document.getElementById('similarPropsScroll');
            if (!section || !scroll) return;

            scroll.innerHTML = similar.map(p => {
                const title = p.title?.zh || p.title?.en || p.title || '樓盤';
                const loc = p.location?.zh || p.location?.en || p.location || '';
                const img = p.image || 'https://via.placeholder.com/240x140?text=No+Photo';
                return `
                    <a href="/property.html?id=${p.id}" class="similar-prop-card">
                        <img src="${img}" alt="${title}" onerror="this.src='https://via.placeholder.com/240x140?text=No+Photo'">
                        <div class="similar-prop-info">
                            <div class="similar-prop-title">${title}</div>
                            <div class="similar-prop-loc"><i class="fas fa-map-marker-alt"></i> ${loc}</div>
                            <div class="similar-prop-price">${p.price}</div>
                            <div class="similar-prop-feats">
                                <span><i class="fas fa-bed"></i> ${p.beds}</span>
                                <span><i class="fas fa-bath"></i> ${p.baths}</span>
                                <span><i class="fas fa-expand-arrows-alt"></i> ${p.sqft}呎</span>
                            </div>
                        </div>
                    </a>
                `;
            }).join('');

            section.style.display = 'block';
        } catch(e) { /* silent */ }
    }

    // Patch renderProperty to also load similar
    const _origRender = renderProperty;
    renderProperty = function(p) {
        _origRender(p);
        loadSimilarProperties(propId);

        // Update WhatsApp link with property title
        const waLink = document.querySelector('a[href*="wa.me"]');
        if (waLink) {
            const title = p.title?.zh || p.title?.en || '此樓盤';
            const msg = encodeURIComponent(`你好，我在88loft見到「${title}」，想了解更多。連結：${window.location.href}`);
            waLink.href = `https://wa.me/85294301551?text=${msg}`;
        }
    };

</script>
